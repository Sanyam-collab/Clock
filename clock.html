<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="clock.css">
</head>
<body>
    <div class="container">
        <div class="time-box">
            <span id="hrs">00</span>
            <p>Hours</p>
        </div>
        <div class="time-box">
            <span id="min">00</span>
            <p>Minutes</p>
        </div>
        <div class="time-box">
            <span id="sec">00</span>
            <p>Seconds</p>
        </div>
    </div>
    <script src="clock.js"></script>
</body>
</html>
